<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    <!-- Cargamos Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* ESTILOS (Mantenemos tu diseño estético) */
        body { background-color: #FFF5F5; font-family: 'Segoe UI', sans-serif; color: #8C5E5E; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .portada { text-align: center; padding: 40px; background: white; border-radius: 20px; width: 100%; max-width: 800px; margin-bottom: 30px; border: 1px solid #F2DADA; }
        .portada h1 { font-size: 3.5rem; margin: 0; color: #A67B7B; letter-spacing: 5px; }
        .grid-inicio { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 700px; }
        .boton-sector { background-color: #D4A5A5; color: white; border: none; padding: 50px 20px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; }
        #caja-gestion { display: none; margin-top: 40px; width: 100%; max-width: 850px; background: white; padding: 30px; border-radius: 25px; border: 2px solid #D4A5A5; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .detalles-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .tarjeta-info { background: #FFF9F9; padding: 20px; border-radius: 15px; border-left: 5px solid #D4A5A5; }
        .valor { font-weight: bold; color: #A67B7B; }
        .btn-cerrar { display: block; margin: 30px auto 0; background: #8C5E5E; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="portada">
        <p>Leidyd</p>
        <h1>PLANIFICADOR</h1>
    </div>

    <div class="grid-inicio">
        <button class="boton-sector" onclick="abrirGestion('EL_MANA')">El Maná</button>
        <button class="boton-sector" onclick="abrirGestion('MBURUKUJA')">Mburukujá</button>
        <button class="boton-sector" onclick="abrirGestion('TRANSPORTE')">Transporte</button>
        <button class="boton-sector" onclick="abrirGestion('RECORDATORIO')">Recordatorio</button>
    </div>

    <div id="caja-gestion">
        <h2 id="nombre-negocio" style="text-align: center; color: #A67B7B;"></h2>
        <div class="detalles-container">
            <div class="tarjeta-info">
                <h3>📦 Inventario</h3>
                <p>Estado: <span id="disp-info" class="valor">Cargando...</span></p>
                <p>Costo: <span id="costo-inv" class="valor">0</span> Gs.</p>
            </div>
            <div class="tarjeta-info">
                <h3>💰 Responsabilidades</h3>
                <p>Pendiente: <span id="pago-pend" class="valor">Cargando...</span></p>
                <p>Fecha: <span id="fecha-pago" class="valor">--/--</span></p>
            </div>
            <div class="tarjeta-info">
                <h3>👥 Personal</h3>
                <p>Gastos: <span id="gasto-pers" class="valor">0</span> Gs.</p>
                <p><a href="#" id="link-personal" style="color:#D4A5A5">Ver Currículums</a></p>
            </div>
        </div>
        <button class="btn-cerrar" onclick="cerrarGestion()">Cerrar Vista</button>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE (Reemplaza con tus datos de la consola)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://TU_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_PROJECT_ID.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function abrirGestion(sectorId) {
            const panel = document.getElementById('caja-gestion');
            document.getElementById('nombre-negocio').innerText = "GESTIÓN: " + sectorId.replace('_', ' ');
            panel.style.display = 'block';

            // LEER DATOS DESDE FIREBASE EN TIEMPO REAL
            database.ref('negocios/' + sectorId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('disp-info').innerText = data.inventario || "Sin datos";
                    document.getElementById('costo-inv').innerText = data.costo_inventario || "0";
                    document.getElementById('pago-pend').innerText = data.pendiente || "Nada";
                    document.getElementById('fecha-pago').innerText = data.fecha || "--/--";
                    document.getElementById('gasto-pers').innerText = data.gastos_personal || "0";
                }
            });

            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function cerrarGestion() {
            document.getElementById('caja-gestion').style.display = 'none';
        }
    </script>
</body>
</html>
