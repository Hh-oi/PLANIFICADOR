<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { --rosa-pastel: #FFF5F5; --cafe-suave: #A67B7B; --dorado-tenue: #D4A5A5; --texto: #5A4444; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--rosa-pastel); color: var(--texto); }
        
        #pantalla-bienvenida { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: white; }
        .titulo-bienvenida { font-family: 'Cinzel', serif; font-size: 3.5rem; margin: 0 0 40px 0; color: var(--cafe-suave); }
        .btn-ingresar { padding: 15px 50px; letter-spacing: 3px; background: transparent; border: 1px solid var(--dorado-tenue); color: var(--cafe-suave); cursor: pointer; text-transform: uppercase; }

        #panel-inicio { display: none; padding: 60px 20px; max-width: 900px; margin: 0 auto; text-align: center; }
        .grid-botones { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 50px; }
        .card-negocio { background: white; padding: 60px 20px; border: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .card-negocio h3 { font-family: 'Cinzel', serif; letter-spacing: 4px; color: var(--cafe-suave); }

        #vista-detalle { display: none; max-width: 1100px; margin: 40px auto; padding: 30px; background: white; min-height: 90vh; }
        .header-detalle { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .seccion-carga { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .bloque-input { background: #fff; border: 1px solid #f2f2f2; padding: 20px; border-radius: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 5px; box-sizing: border-box; }
        
        /* Estilos de la Tabla */
        .contenedor-tabla { margin-top: 20px; max-height: 300px; overflow-y: auto; border: 1px solid #f2f2f2; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--rosa-pastel); position: sticky; top: 0; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .btn-tabla { padding: 5px 10px; cursor: pointer; border: none; border-radius: 3px; font-size: 0.7rem; }
        .btn-borrar { background: #ffeded; color: #cc5c5c; }
        .btn-editar { background: #f0f0ff; color: #5c5ccc; margin-right: 5px; }

        .buscador { background: #fff; border: 1px solid var(--dorado-tenue); padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="pantalla-bienvenida">
        <h1 class="titulo-bienvenida">PLANIFICADOR</h1>
        <button class="btn-ingresar" onclick="entrar()">Ingresar</button>
    </div>

    <div id="panel-inicio">
        <div class="grid-botones">
            <div class="card-negocio" onclick="verSector('EL_MANA')"><h3>EL MANÁ</h3></div>
            <div class="card-negocio" onclick="verSector('MBURUKUJA')"><h3>MBURUKUJÁ</h3></div>
            <div class="card-negocio" onclick="verSector('RECORDATORIOS')"><h3>RECORDATORIOS</h3></div>
        </div>
    </div>

    <div id="vista-detalle">
        <div class="header-detalle">
            <button onclick="volver()" style="background:none; border:none; color:var(--dorado-tenue); cursor:pointer;">← VOLVER</button>
            <h2 id="titulo-sector" style="font-family:'Cinzel'; letter-spacing:5px; margin:0;"></h2>
            <div style="width: 80px;"></div>
        </div>

        <div class="seccion-carga">
            <!-- Inventario con Buscador y Tabla -->
            <div class="bloque-input">
                <h3 style="font-family:'Cinzel'; font-size:0.9rem;">📦 Gestión de Inventario</h3>
                <input type="text" id="inv-nombre" placeholder="Nombre del producto">
                <input type="text" id="inv-precio" placeholder="Precio de Costo (Gs)" oninput="formatearInput(this)">
                <button id="btn-inv-accion" style="width:100%; padding:10px; background:var(--cafe-suave); color:white; border:none;" onclick="guardarInventario()">Guardar Producto</button>
                
                <input type="text" class="buscador" id="busqueda-inv" placeholder="🔍 Buscar producto..." oninput="renderizarInventario()">
                <div class="contenedor-tabla">
                    <table id="tabla-inventario">
                        <thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                        <tbody id="body-inventario"></tbody>
                    </table>
                </div>
            </div>

            <!-- Gastos -->
            <div class="bloque-input">
                <h3 style="font-family:'Cinzel'; font-size:0.9rem;">💸 Gastos de Sector</h3>
                <input type="text" id="gasto-desc" placeholder="Descripción del gasto">
                <input type="text" id="gasto-monto" placeholder="Monto (Gs)" oninput="formatearInput(this)">
                <button style="width:100%; padding:10px; background:var(--dorado-tenue); color:white; border:none;" onclick="guardarGasto()">Registrar Gasto</button>
                
                <div style="margin-top:20px; padding:15px; background:var(--rosa-pastel); text-align:center;">
                    <p style="font-size:0.7rem; margin:0;">TOTAL GASTOS ACUMULADOS</p>
                    <h2 id="total-gastos-sum" style="margin:5px 0;">0 Gs.</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMmt5ZsafqLxGLpRhfrpMdOGk3OUvyl9E",
            authDomain: "planificador-leidyd.firebaseapp.com",
            projectId: "planificador-leidyd",
            storageBucket: "planificador-leidyd.firebasestorage.app",
            messagingSenderId: "930473531039",
            appId: "1:930473531039:web:085de97dcd2547987b34aa",
            databaseURL: "https://planificador-leidyd-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let sectorActual = "";
        let editandoId = null;
        let listaCompletaInv = {};

        function entrar() { document.getElementById('pantalla-bienvenida').style.display='none'; document.getElementById('panel-inicio').style.display='block'; }
        function volver() { document.getElementById('vista-detalle').style.display='none'; document.getElementById('panel-inicio').style.display='block'; }

        function formatearInput(input) {
            let value = input.value.replace(/\D/g, "");
            input.value = value ? Number(value).toLocaleString('es-PY') : "";
        }

        function verSector(id) {
            sectorActual = id;
            document.getElementById('panel-inicio').style.display='none';
            document.getElementById('vista-detalle').style.display='block';
            document.getElementById('titulo-sector').innerText = id.replace('_', ' ');
            escucharDatos();
        }

        function guardarInventario() {
            const nombre = document.getElementById('inv-nombre').value;
            const precio = Number(document.getElementById('inv-precio').value.replace(/\./g, ""));
            
            if(nombre && precio) {
                if(editandoId) {
                    db.ref(`negocios/${sectorActual}/inventario_lista/${editandoId}`).update({ nombre, precio });
                    editandoId = null;
                    document.getElementById('btn-inv-accion').innerText = "Guardar Producto";
                } else {
                    db.ref(`negocios/${sectorActual}/inventario_lista`).push({ nombre, precio });
                }
                document.getElementById('inv-nombre').value = ""; document.getElementById('inv-precio').value = "";
            }
        }

        function escucharDatos() {
            db.ref(`negocios/${sectorActual}/inventario_lista`).on('value', (snap) => {
                listaCompletaInv = snap.val() || {};
                renderizarInventario();
            });

            db.ref(`negocios/${sectorActual}/gastos_lista`).on('value', (snap) => {
                let total = 0;
                snap.forEach(child => { total += child.val().monto; });
                document.getElementById('total-gastos-sum').innerText = total.toLocaleString('es-PY') + " Gs.";
            });
        }

        function renderizarInventario() {
            const tbody = document.getElementById('body-inventario');
            const busqueda = document.getElementById('busqueda-inv').value.toLowerCase();
            tbody.innerHTML = "";
            
            for(let id in listaCompletaInv) {
                const p = listaCompletaInv[id];
                if(p.nombre.toLowerCase().includes(busqueda)) {
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.nombre}</td>
                            <td>${p.precio.toLocaleString('es-PY')}</td>
                            <td>
                                <button class="btn-tabla btn-editar" onclick="prepararEdicion('${id}', '${p.nombre}', ${p.precio})">✎</button>
                                <button class="btn-tabla btn-borrar" onclick="borrarItem('${id}')">✕</button>
                            </td>
                        </tr>
                    `;
                }
            }
        }

        function prepararEdicion(id, nombre, precio) {
            editandoId = id;
            document.getElementById('inv-nombre').value = nombre;
            document.getElementById('inv-precio').value = precio.toLocaleString('es-PY');
            document.getElementById('btn-inv-accion').innerText = "Actualizar Producto";
            document.getElementById('inv-nombre').focus();
        }

        function borrarItem(id) {
            if(confirm("¿Eliminar este producto?")) db.ref(`negocios/${sectorActual}/inventario_lista/${id}`).remove();
        }

        function guardarGasto() {
            const desc = document.getElementById('gasto-desc').value;
            const monto = Number(document.getElementById('gasto-monto').value.replace(/\./g, ""));
            if(desc && monto) {
                db.ref(`negocios/${sectorActual}/gastos_lista`).push({ desc, monto });
                document.getElementById('gasto-desc').value = ""; document.getElementById('gasto-monto').value = "";
            }
        }
    </script>
</body>
</html>
