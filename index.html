<!-- Reemplaza la sección "contenido-sector" en tu index.html con esto -->
<div id="contenido-sector">
    
    <!-- BLOQUE 1: RESUMEN TOTALIZADO -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
        <div class="tarjeta-resumen" style="background: #fdf2f2; border: 1px solid var(--dorado-tenue);">
            <p style="font-size: 0.7rem; margin: 0; letter-spacing: 1px;">TOTAL GASTOS CARGADOS</p>
            <h2 id="total-gastos-sumados" style="color: var(--cafe-suave); margin: 10px 0;">0 Gs.</h2>
        </div>
        <div class="tarjeta-resumen" style="background: white; border: 1px solid #eee;">
            <p style="font-size: 0.7rem; margin: 0; letter-spacing: 1px;">PRODUCTOS EN INVENTARIO</p>
            <h2 id="conteo-productos" style="color: var(--dorado-tenue); margin: 10px 0;">0</h2>
        </div>
    </div>

    <!-- BLOQUE 2: CARGA DE INVENTARIO Y GASTOS -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        
        <!-- Gestión de Inventario -->
        <div class="calculadora-contenedor">
            <h3 style="font-family: 'Cinzel'; font-size: 0.9rem;">📦 Cargar Nuevo Producto</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="inv-nombre" placeholder="Nombre (ej: Pan Brioche)">
                <input type="number" id="inv-precio" placeholder="Precio de Costo (Gs)">
                <button onclick="guardarEnInventario()" style="background: var(--cafe-suave); color: white; border: none; padding: 10px; cursor: pointer;">Guardar Producto</button>
            </div>
            <div id="lista-productos-cargados" style="margin-top: 20px; font-size: 0.8rem; max-height: 150px; overflow-y: auto;">
                <!-- Aquí aparecerán tus productos -->
            </div>
        </div>

        <!-- Gestión de Gastos -->
        <div class="calculadora-contenedor">
            <h3 style="font-family: 'Cinzel'; font-size: 0.9rem;">💸 Registrar Gasto</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="gasto-desc" placeholder="Descripción (ej: Factura ANDE)">
                <input type="number" id="gasto-monto" placeholder="Monto (Gs)">
                <button onclick="registrarGasto()" style="background: var(--dorado-tenue); color: white; border: none; padding: 10px; cursor: pointer;">Cargar Gasto</button>
            </div>
            <div id="lista-gastos-recientes" style="margin-top: 20px; font-size: 0.8rem; color: #999;">
                <!-- Aquí verás tus últimos gastos -->
            </div>
        </div>
    </div>

    <!-- BLOQUE 3: CALCULADORA DE RECETAS -->
    <div class="calculadora-contenedor" style="margin-top: 30px; border-top: 3px solid var(--cafe-suave);">
        <h3 style="font-family: 'Cinzel';">🍔 Armar Costo de Hamburguesa</h3>
        <p style="font-size: 0.8rem;">Seleccioná los productos que ya cargaste arriba:</p>
        
        <div id="calculadora-receta">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <select class="select-producto" style="flex: 2; padding: 10px; border: 1px solid #eee;" onchange="sumarReceta()">
                    <option value="0">Seleccionar Producto...</option>
                </select>
                <input type="number" value="0" class="precio-auto" style="flex: 1; background: #f9f9f9;" readonly>
            </div>
        </div>
        <button onclick="nuevaFilaReceta()" style="background: none; border: 1px dashed var(--cafe-suave); color: var(--cafe-suave); padding: 5px 15px; cursor: pointer;">+ Otro ingrediente</button>
        
        <div style="text-align: right; margin-top: 20px; padding: 20px; background: #FFF5F5;">
            <h4 style="margin:0;">COSTO FINAL UNITARIO:</h4>
            <h2 id="total-receta" style="color: var(--cafe-suave);">0 Gs.</h2>
        </div>
    </div>
</div>
