<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --rosa-pastel: #FFF5F5;
            --cafe-suave: #A67B7B;
            --dorado-tenue: #D4A5A5;
            --texto: #5A4444;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--rosa-pastel);
            color: var(--texto);
            overflow-x: hidden;
        }

        /* --- PANTALLA DE BIENVENIDA --- */
        #pantalla-bienvenida {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: white;
            transition: transform 0.8s ease-in-out;
        }

        .logo-principal {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            color: var(--dorado-tenue);
        }

        .titulo-bienvenida {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            margin: 0 0 40px 0;
            color: var(--cafe-suave);
        }

        .btn-ingresar {
            padding: 15px 50px;
            font-size: 1rem;
            letter-spacing: 3px;
            background: transparent;
            border: 1px solid var(--dorado-tenue);
            color: var(--cafe-suave);
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-ingresar:hover {
            background: var(--dorado-tenue);
            color: white;
        }

        /* --- PANEL DE INICIO --- */
        #panel-inicio {
            display: none;
            padding: 60px 20px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .grid-botones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card-negocio {
            background: white;
            padding: 60px 20px;
            border-radius: 2px; /* Estilo más cuadrado y minimalista */
            border: 1px solid #eee;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .card-negocio:hover {
            border-color: var(--dorado-tenue);
            transform: translateY(-5px);
        }

        .card-negocio h3 {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            margin: 0;
            color: var(--cafe-suave);
        }

        /* --- VISTA SECTOR (EL MANÁ) --- */
        #vista-detalle {
            display: none;
            max-width: 1000px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            min-height: 80vh;
        }

        .header-detalle {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-volver {
            background: none;
            border: none;
            color: var(--dorado-tenue);
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- 1. Pantalla de Bienvenida -->
    <div id="pantalla-bienvenida">
        <div class="logo-principal">LEIDYD</div>
        <h1 class="titulo-bienvenida">PLANIFICADOR</h1>
        <button class="btn-ingresar" onclick="entrar()">Ingresar</button>
    </div>

    <!-- 2. Panel Principal (Después de Ingresar) -->
    <div id="panel-inicio">
        <div class="logo-principal">SELECCIONA UN SECTOR</div>
        <div class="grid-botones">
            <div class="card-negocio" onclick="verSector('EL MANÁ')">
                <h3>EL MANÁ</h3>
            </div>
            <div class="card-negocio" onclick="verSector('MBURUKUJÁ')">
                <h3>MBURUKUJÁ</h3>
            </div>
            <div class="card-negocio" onclick="verSector('RECORDATORIOS')">
                <h3>RECORDATORIOS</h3>
            </div>
        </div>
    </div>

    <!-- 3. Vista de Detalle (Diseñaremos el interior de El Maná aquí) -->
    <div id="vista-detalle">
        <div class="header-detalle">
            <button class="btn-volver" onclick="volver()">← VOLVER AL INICIO</button>
            <h2 id="titulo-sector" style="font-family: 'Cinzel'; letter-spacing: 5px; margin:0;"></h2>
            <div style="width: 100px;"></div> <!-- Espaciador -->
        </div>
        
        <div id="contenido-sector">
            <!-- Aquí vamos a diseñar lo que me pidas para El Maná -->
            <p style="text-align: center; color: #ccc; margin-top: 100px;">
                Diseñando el panel de control...
            </p>
        </div>
    </div>

    <script>
        function entrar() {
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('panel-inicio').style.display = 'block';
        }

        function verSector(nombre) {
            document.getElementById('panel-inicio').style.display = 'none';
            document.getElementById('vista-detalle').style.display = 'block';
            document.getElementById('titulo-sector').innerText = nombre;
        }

        function volver() {
            document.getElementById('vista-detalle').style.display = 'none';
            document.getElementById('panel-inicio').style.display = 'block';
        }
    </script>
</body>
</html>
