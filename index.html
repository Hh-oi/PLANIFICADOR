<!-- Esta es la caja que aparecerá al hacer clic -->
<div id="detalle-negocio" class="caja-oculta" style="display:none; margin-top: 20px; padding: 20px; border: 2px solid #D4A5A5; border-radius: 15px; background-color: #FFF5F5;">
    <h2 id="titulo-negocio" style="color: #8C5E5E;"></h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="seccion-planificador">
            <h4 style="color: #A67B7B;">📦 Inventario y Costos</h4>
            <p>Disponible: <span id="stock-info">Cargando...</span></p>
            <p>Costos fijos: <span id="costo-info">0 Gs.</span></p>
        </div>

        <div class="seccion-planificador">
            <h4 style="color: #A67B7B;">📅 Pagos y Responsabilidades</h4>
            <p>Falta pagar: <span id="pendientes-info">Nada pendiente</span></p>
            <p>Fecha de pago: <span id="fecha-info">--/--/--</span></p>
        </div>

        <div class="seccion-planificador">
            <h4 style="color: #A67B7B;">👥 Personal</h4>
            <p>Gastos sueldos: <span id="gastos-personal">0 Gs.</span></p>
            <a href="#" id="link-cv" style="color: #D4A5A5;">Ver Currículums</a>
        </div>
    </div>
    <br>
    <button onclick="cerrarCaja()" style="background-color: #D4A5A5; color: white; border: none; padding: 5px 15px; border-radius: 5px;">Cerrar</button>
</div>
