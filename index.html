<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { --rosa-pastel: #FFF5F5; --cafe-suave: #A67B7B; --dorado-tenue: #D4A5A5; --texto: #5A4444; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--rosa-pastel); color: var(--texto); }
        
        #pantalla-bienvenida, #panel-inicio, #vista-sub-menu, #seccion-contenido { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; text-align: center; }

        .grid-botones { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 40px 20px; border: 1px solid #eee; cursor: pointer; transition: 0.3s; border-radius: 8px; position: relative; }
        .card h3 { font-family: 'Cinzel', serif; letter-spacing: 2px; color: var(--cafe-suave); font-size: 0.9rem; margin: 0; }

        .bloque-blanco { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: left; max-width: 850px; margin: 0 auto; }
        
        /* Personal Formulario */
        #contenedor-formulario { display: none; margin-bottom: 30px; padding-bottom: 30px; }
        .foto-registro { text-align: center; margin-bottom: 20px; }
        .circulo-perfil { width: 100px; height: 100px; border-radius: 50%; border: 1px solid var(--dorado-tenue); margin: 0 auto 10px; overflow: hidden; background: #fafafa; display: flex; align-items: center; justify-content: center; }
        .circulo-perfil img { width: 100%; height: 100%; object-fit: cover; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.65rem; font-weight: bold; color: var(--cafe-suave); display: block; margin-bottom: 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 5px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        
        .btn-principal { background: var(--cafe-suave); color: white; width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-agregar { background: white; color: var(--cafe-suave); border: 1px solid var(--cafe-suave); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; font-size: 0.8rem; }

        /* Ficha Personal Estilo CV */
        .ficha-cv { background: #fff; border-radius: 10px; padding: 15px; margin-top: 15px; display: flex; gap: 15px; border: 1px solid #f0f0f0; position: relative; }
        .foto-cv { width: 80px; height: 100px; border-radius: 5px; object-fit: cover; background: #f9f9f9; }
        .datos-cv { flex: 1; }
        .datos-cv h4 { margin: 0 0 8px; font-family: 'Cinzel'; color: var(--cafe-suave); border-bottom: 1px solid #eee; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.8rem; }
        .btn-borrar { position: absolute; top: 10px; right: 10px; color: #fcc; cursor: pointer; background: none; border: none; font-size: 1.1rem; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background: var(--rosa-pastel); color: var(--cafe-suave); padding: 10px; text-align: left; font-family: 'Cinzel'; font-size: 0.7rem; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="pantalla-bienvenida" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: white;">
        <h1 style="font-family:'Cinzel'; color: var(--cafe-suave);">PLANIFICADOR</h1>
        <button onclick="cambiarVista('panel-inicio')" style="background:transparent; border:1px solid var(--dorado-tenue); padding:10px 40px; color:var(--cafe-suave); letter-spacing:3px; cursor:pointer;">INGRESAR</button>
    </div>

    <div id="panel-inicio">
        <h2 style="font-family:'Cinzel';">MIS SECTORES</h2>
        <div class="grid-botones">
            <div class="card" onclick="seleccionarNegocio('EL_MANA')"><h3>EL MANÁ</h3></div>
            <div class="card" onclick="seleccionarNegocio('MBURUKUJA')"><h3>MBURUKUJÁ</h3></div>
            <div class="card" onclick="seleccionarNegocio('ESPUEMA')"><h3>ESPUMA</h3></div>
        </div>
    </div>

    <div id="vista-sub-menu">
        <button onclick="cambiarVista('panel-inicio')" style="float:left; background:none; color:var(--dorado-tenue); cursor:pointer; border:none;">← INICIO</button>
        <h2 id="nombre-sector-titulo" style="font-family:'Cinzel'; letter-spacing:5px;"></h2>
        <div class="grid-botones">
            <div class="card" onclick="abrirSeccion('inventario')"><h3>📦 INVENTARIO</h3></div>
            <div class="card" onclick="abrirSeccion('menu')"><h3>🍔 MENÚ</h3></div>
            <div class="card" onclick="abrirSeccion('gastos')"><h3>💸 GASTOS</h3></div>
            <div class="card" onclick="abrirSeccion('personal')"><h3>👥 PERSONAL</h3></div>
        </div>
    </div>

    <div id="seccion-contenido">
        <button onclick="cambiarVista('vista-sub-menu')" style="float:left; background:none; color:var(--dorado-tenue); cursor:pointer; border:none;">← VOLVER</button>
        <h2 id="titulo-seccion" style="font-family:'Cinzel';"></h2>
        <div id="area-trabajo"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMmt5ZsafqLxGLpRhfrpMdOGk3OUvyl9E",
            authDomain: "planificador-leidyd.firebaseapp.com",
            projectId: "planificador-leidyd",
            storageBucket: "planificador-leidyd.firebasestorage.app",
            messagingSenderId: "930473531039",
            appId: "1:930473531039:web:085de97dcd2547987b34aa",
            databaseURL: "https://planificador-leidyd-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sectorActivo = "";
        let fotoCargada = "";

        window.onload = () => cambiarVista('pantalla-bienvenida');

        function cambiarVista(id) {
            document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function seleccionarNegocio(id) {
            sectorActivo = id;
            document.getElementById('nombre-sector-titulo').innerText = id.replace('_', ' ');
            cambiarVista('vista-sub-menu');
        }

        function abrirSeccion(tipo) {
            const area = document.getElementById('area-trabajo');
            cambiarVista('seccion-contenido');
            document.getElementById('titulo-seccion').innerText = "GESTIÓN DE " + tipo.toUpperCase();

            if(tipo === 'personal') {
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <div style="text-align: right;"><button class="btn-agregar" id="btn-toggle-form" onclick="mostrarFormulario()">+ AGREGAR PERSONAL</button></div>
                        
                        <div id="contenedor-formulario">
                            <h3 style="font-family:'Cinzel'; font-size:0.8rem; text-align:center; color:var(--cafe-suave);">NUEVO REGISTRO</h3>
                            <div class="foto-registro">
                                <div class="circulo-perfil" id="preview-perfil">👤</div>
                                <input type="file" id="input-foto" style="display:none" onchange="cargarFoto(this)">
                                <button onclick="document.getElementById('input-foto').click()" style="font-size:0.6rem; cursor:pointer; background:none; border:1px solid #ddd; padding:2px 5px;">CAMBIAR FOTO</button>
                            </div>
                            <div class="form-grid">
                                <div class="full-width"><label>Nombre</label><input type="text" id="p-nombre"></div>
                                <div><label>Nacimiento</label><input type="date" id="p-fecha"></div>
                                <div><label>WhatsApp</label><input type="text" id="p-tel"></div>
                                <div><label>Nacionalidad</label><input type="text" id="p-pais"></div>
                                <div><label>Ciudad</label><input type="text" id="p-ciudad"></div>
                                <div><label>Documento</label><input type="text" id="p-doc"></div>
                                <div><label>Estado Civil</label>
                                    <select id="p-civil"><option>SOLTERA</option><option>SOLTERO</option><option>CÓNYUGE</option></select>
                                </div>
                                <div><label>Día Libre</label><input type="text" id="p-libre"></div>
                                <div><label>Función</label><input type="text" id="p-fun"></div>
                            </div>
                            <button class="btn-principal" onclick="guardarColaborador()">GUARDAR</button>
                            <button class="btn-principal" style="background:#f5f5f5; color:#999;" onclick="ocultarFormulario()">CANCELAR</button>
                        </div>

                        <div id="lista-personal-cv"></div>
                    </div>`;
                renderPersonal();
            } else {
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <div class="form-grid">
                            <input type="text" id="item-n" placeholder="Nombre/Concepto">
                            <input type="number" id="item-v" placeholder="Valor/Cantidad">
                        </div>
                        <button class="btn-principal" onclick="guardarGenerico('${tipo}')">AÑADIR</button>
                        <table id="tabla-datos"><thead><tr><th>Concepto</th><th>Valor</th><th></th></tr></thead><tbody id="cuerpo-tabla"></tbody></table>
                    </div>`;
                renderGenerico(tipo);
            }
        }

        // FUNCIONES PERSONAL CON OCULTAMIENTO DE LISTA
        function mostrarFormulario() { 
            document.getElementById('contenedor-formulario').style.display = 'block'; 
            document.getElementById('btn-toggle-form').style.display = 'none'; 
            document.getElementById('lista-personal-cv').style.display = 'none'; // OCULTAR LISTA
        }

        function ocultarFormulario() { 
            document.getElementById('contenedor-formulario').style.display = 'none'; 
            document.getElementById('btn-toggle-form').style.display = 'inline-block'; 
            document.getElementById('lista-personal-cv').style.display = 'block'; // MOSTRAR LISTA
            document.getElementById('preview-perfil').innerHTML = "👤";
            fotoCargada = "";
        }
        
        function cargarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { fotoCargada = e.target.result; document.getElementById('preview-perfil').innerHTML = `<img src="${fotoCargada}">`; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function guardarColaborador() {
            const data = {
                nombre: document.getElementById('p-nombre').value,
                fecha: document.getElementById('p-fecha').value,
                tel: document.getElementById('p-tel').value,
                pais: document.getElementById('p-pais').value,
                ciudad: document.getElementById('p-ciudad').value,
                doc: document.getElementById('p-doc').value,
                civil: document.getElementById('p-civil').value,
                libre: document.getElementById('p-libre').value,
                funcion: document.getElementById('p-fun').value,
                foto: fotoCargada
            };
            db.ref(`negocios/${sectorActivo}/personal`).push(data).then(() => {
                ocultarFormulario();
            });
        }

        function renderPersonal() {
            db.ref(`negocios/${sectorActivo}/personal`).on('value', snap => {
                const list = document.getElementById('lista-personal-cv'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(c => {
                    const v = c.val();
                    const edad = v.fecha ? new Date().getFullYear() - new Date(v.fecha).getFullYear() : "??";
                    list.innerHTML += `
                        <div class="ficha-cv">
                            <img src="${v.foto || 'https://via.placeholder.com/80'}" class="foto-cv">
                            <div class="datos-cv">
                                <h4>${v.nombre}</h4>
                                <div class="grid-info">
                                    <div><strong>Edad:</strong> ${edad}</div><div><strong>WhatsApp:</strong> ${v.tel}</div>
                                    <div><strong>Doc:</strong> ${v.doc}</div><div><strong>Civil:</strong> ${v.civil}</div>
                                    <div><strong>Libre:</strong> ${v.libre}</div><div><strong>Función:</strong> ${v.funcion}</div>
                                </div>
                            </div>
                            <button class="btn-borrar" onclick="eliminar('${c.key}', 'personal')">✕</button>
                        </div>`;
                });
            });
        }

        function guardarGenerico(tipo) {
            const n = document.getElementById('item-n').value;
            const v = document.getElementById('item-v').value;
            if(n && v) db.ref(`negocios/${sectorActivo}/${tipo}`).push({nombre: n, valor: v});
            document.getElementById('item-n').value = ""; document.getElementById('item-v').value = "";
        }

        function renderGenerico(tipo) {
            db.ref(`negocios/${sectorActivo}/${tipo}`).on('value', snap => {
                const cuerpo = document.getElementById('cuerpo-tabla'); if(!cuerpo) return;
                cuerpo.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.val();
                    cuerpo.innerHTML += `<tr><td>${d.nombre}</td><td>${d.valor}</td><td style="text-align:right"><button style="color:red; background:none; border:none; cursor:pointer;" onclick="eliminar('${doc.key}', '${tipo}')">✕</button></td></tr>`;
                });
            });
        }

        function eliminar(id, tipo) { if(confirm("¿Eliminar?")) db.ref(`negocios/${sectorActivo}/${tipo}/${id}`).remove(); }
    </script>
</body>
</html>
