<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    
    <!-- Cargamos las librerías necesarias de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #FFF5F5; font-family: 'Segoe UI', sans-serif; color: #8C5E5E; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .portada { text-align: center; padding: 40px; background: white; border-radius: 20px; width: 100%; max-width: 800px; margin-bottom: 30px; border: 1px solid #F2DADA; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .portada h1 { font-size: 3rem; margin: 0; color: #A67B7B; letter-spacing: 5px; text-transform: uppercase; }
        .grid-inicio { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 700px; }
        .boton-sector { background-color: #D4A5A5; color: white; border: none; padding: 40px 20px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .boton-sector:hover { background-color: #A67B7B; transform: translateY(-2px); }
        
        #caja-gestion { display: none; margin-top: 30px; width: 100%; max-width: 800px; background: white; padding: 25px; border-radius: 20px; border: 2px solid #D4A5A5; }
        .tarjeta-info { background: #FFF9F9; padding: 15px; border-radius: 12px; border-left: 5px solid #D4A5A5; margin-bottom: 10px; }
        .valor { font-weight: bold; color: #A67B7B; font-size: 1.1rem; }
        .btn-cerrar { display: block; margin: 20px auto 0; background: #8C5E5E; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="portada">
        <p style="font-style: italic; margin: 0;">Leidyd Villalba</p>
        <h1>PLANIFICADOR</h1>
    </div>

    <div class="grid-inicio">
        <!-- Los IDs de aquí deben ser iguales a los de Firebase -->
        <button class="boton-sector" onclick="abrirGestion('EL_MANA')">El Maná</button>
        <button class="boton-sector" onclick="abrirGestion('MBURUKUJA')">Mburukujá</button>
        <button class="boton-sector" onclick="abrirGestion('TRANSPORTE')">Transporte</button>
        <button class="boton-sector" onclick="abrirGestion('RECORDATORIO')">Recordatorio</button>
    </div>

    <div id="caja-gestion">
        <h2 id="nombre-negocio" style="text-align: center; color: #A67B7B; text-transform: uppercase;"></h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div class="tarjeta-info">
                <h3>📦 Inventario</h3>
                <p>Estado: <span id="disp-info" class="valor">...</span></p>
                <p>Costo: <span id="costo-inv" class="valor">0</span> Gs.</p>
            </div>
            <div class="tarjeta-info">
                <h3>👥 Personal</h3>
                <p>Gastos: <span id="gasto-pers" class="valor">0</span> Gs.</p>
            </div>
        </div>
        <button class="btn-cerrar" onclick="cerrarGestion()">Cerrar Vista</button>
    </div>

    <script>
        // Aquí es donde pusimos el link que me preguntaste (databaseURL)
        const firebaseConfig = {
            apiKey: "AIzaSyDMmt5ZsafqLxGLpRhfrpMdOGk3OUvyl9E",
            authDomain: "planificador-leidyd.firebaseapp.com",
            projectId: "planificador-leidyd",
            storageBucket: "planificador-leidyd.firebasestorage.app",
            messagingSenderId: "930473531039",
            appId: "1:930473531039:web:085de97dcd2547987b34aa",
            databaseURL: "https://planificador-leidyd-default-rtdb.firebaseio.com"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function abrirGestion(sectorId) {
            const panel = document.getElementById('caja-gestion');
            document.getElementById('nombre-negocio').innerText = sectorId.replace('_', ' ');
            panel.style.display = 'block';

            // Buscar datos en la ruta que creaste (negocios/Sector)
            database.ref('negocios/' + sectorId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('disp-info').innerText = data.inventario || "Sin datos";
                    // .toLocaleString() pone los puntos automáticamente a los números
                    document.getElementById('costo-inv').innerText = (data.costo_inventario || 0).toLocaleString('es-PY');
                    document.getElementById('gasto-pers').innerText = (data.gastos_personal || 0).toLocaleString('es-PY');
                } else {
                    alert("Aún no hay datos cargados para este sector en Firebase.");
                }
            });

            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function cerrarGestion() {
            document.getElementById('caja-gestion').style.display = 'none';
        }
    </script>
</body>
</html>
