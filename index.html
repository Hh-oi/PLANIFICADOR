<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { --rosa-pastel: #FFF5F5; --cafe-suave: #A67B7B; --dorado-tenue: #D4A5A5; --texto: #5A4444; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--rosa-pastel); color: var(--texto); }
        
        #pantalla-bienvenida { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: white; }
        #panel-inicio, #vista-sub-menu, #seccion-contenido { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; text-align: center; }

        .grid-botones { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 40px 20px; border: 1px solid #eee; cursor: pointer; transition: 0.3s; border-radius: 8px; position: relative; }
        .card:hover { border-color: var(--dorado-tenue); transform: translateY(-3px); }
        .card h3 { font-family: 'Cinzel', serif; letter-spacing: 2px; color: var(--cafe-suave); font-size: 0.9rem; margin: 0; }

        .bloque-blanco { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: left; max-width: 850px; margin: 0 auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-principal { background: var(--cafe-suave); color: white; width: 100%; margin-top: 10px; }
        .btn-edit { background: #eef2ff; color: #4f46e5; margin-right: 5px; font-size: 0.7rem; }
        .btn-delete { background: #fef2f2; color: #dc2626; font-size: 0.7rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--rosa-pastel); font-size: 0.8rem; color: var(--cafe-suave); }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }

        .accion-flotante { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="pantalla-bienvenida">
        <h1 style="font-family:'Cinzel'; color: var(--cafe-suave);">PLANIFICADOR</h1>
        <button onclick="cambiarVista('panel-inicio')" style="background:transparent; border:1px solid var(--dorado-tenue); padding:10px 40px; color:var(--cafe-suave); letter-spacing:3px;">INGRESAR</button>
    </div>

    <div id="panel-inicio">
        <h2 style="font-family:'Cinzel';">MIS SECTORES</h2>
        <div class="grid-botones">
            <div class="card" onclick="seleccionarNegocio('EL_MANA')"><h3>EL MANÁ</h3></div>
            <div class="card" onclick="seleccionarNegocio('MBURUKUJA')"><h3>MBURUKUJÁ</h3></div>
            <div class="card" onclick="seleccionarNegocio('ESPUEMA')"><h3>ESPUMA</h3></div>
        </div>
    </div>

    <div id="vista-sub-menu">
        <button onclick="cambiarVista('panel-inicio')" style="float:left; background:none; color:var(--dorado-tenue);">← INICIO</button>
        <h2 id="nombre-sector-titulo" style="font-family:'Cinzel'; letter-spacing:5px;"></h2>
        <div class="grid-botones">
            <div class="card" onclick="abrirSeccion('inventario')"><h3>📦 INVENTARIO</h3></div>
            <div class="card" onclick="abrirSeccion('menu')"><h3>🍔 MENÚ</h3></div>
            <div class="card" onclick="abrirSeccion('gastos')"><h3>💸 GASTOS</h3></div>
            <div class="card" onclick="abrirSeccion('personal')"><h3>👥 PERSONAL</h3></div>
        </div>
    </div>

    <div id="seccion-contenido">
        <button onclick="cambiarVista('vista-sub-menu')" style="float:left; background:none; color:var(--dorado-tenue);">← VOLVER</button>
        <h2 id="titulo-seccion" style="font-family:'Cinzel';"></h2>
        <div id="area-trabajo"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMmt5ZsafqLxGLpRhfrpMdOGk3OUvyl9E",
            authDomain: "planificador-leidyd.firebaseapp.com",
            projectId: "planificador-leidyd",
            storageBucket: "planificador-leidyd.firebasestorage.app",
            messagingSenderId: "930473531039",
            appId: "1:930473531039:web:085de97dcd2547987b34aa",
            databaseURL: "https://planificador-leidyd-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sectorActivo = "";
        let inventarioLocal = {};
        let idEdicion = null;

        function cambiarVista(id) {
            document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            idEdicion = null; 
        }

        function seleccionarNegocio(id) {
            sectorActivo = id;
            document.getElementById('nombre-sector-titulo').innerText = id.replace('_', ' ');
            cambiarVista('vista-sub-menu');
            db.ref(`negocios/${sectorActivo}/inventario`).on('value', snap => { inventarioLocal = snap.val() || {}; });
        }

        function formatearGs(input) {
            let num = input.value.replace(/\D/g, "");
            input.value = num ? Number(num).toLocaleString('es-PY') : "";
        }

        function abrirSeccion(tipo) {
            const area = document.getElementById('area-trabajo');
            const titulo = document.getElementById('titulo-seccion');
            cambiarVista('seccion-contenido');
            
            if(tipo === 'inventario') {
                titulo.innerText = "GESTIÓN DE INVENTARIO";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="inv-nombre" placeholder="Nombre del producto">
                        <select id="inv-medida">
                            <option value="kg">Kilos (Costo por 1000g)</option>
                            <option value="L">Litros (Costo por 1000ml)</option>
                            <option value="unid">Unidades (Costo por 1u)</option>
                        </select>
                        <input type="text" id="inv-precio" placeholder="Precio de Costo (Gs)" oninput="formatearGs(this)">
                        <button id="btn-inv" class="btn-principal" onclick="crudInventario()">GUARDAR PRODUCTO</button>
                        <table><thead><tr><th>Nombre</th><th>Medida</th><th>Costo</th><th>Acciones</th></tr></thead>
                        <tbody id="lista-inv"></tbody></table>
                    </div>`;
                renderInventario();
            } 
            else if(tipo === 'gastos') {
                titulo.innerText = "CONTROL DE GASTOS";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="gas-desc" placeholder="Descripción del gasto">
                        <input type="text" id="gas-monto" placeholder="Monto (Gs)" oninput="formatearGs(this)">
                        <button id="btn-gas" class="btn-principal" onclick="crudGasto()">REGISTRAR GASTO</button>
                        <table><thead><tr><th>Descripción</th><th>Monto</th><th>Acciones</th></tr></thead>
                        <tbody id="lista-gas"></tbody></table>
                    </div>`;
                renderGastos();
            }
            else if(tipo === 'personal') {
                titulo.innerText = "ADMINISTRACIÓN DE PERSONAL";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="per-nombre" placeholder="Nombre Completo">
                        <input type="text" id="per-cargo" placeholder="Cargo">
                        <textarea id="per-cv" placeholder="Trayectoria o datos del CV..."></textarea>
                        <button id="btn-per" class="btn-principal" onclick="crudPersonal()">GUARDAR EMPLEADO</button>
                        <div id="lista-per" style="margin-top:20px;"></div>
                    </div>`;
                renderPersonal();
            }
            else if(tipo === 'menu') {
                titulo.innerText = "MENÚ Y RECETARIO";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="menu-nombre" placeholder="Nombre del plato (ej: Hamburguesa Especial)">
                        <button id="btn-menu" class="btn-principal" onclick="crudMenu()">CREAR PLATO EN MENÚ</button>
                        <div id="lista-menu" style="margin-top:20px;"></div>
                    </div>`;
                renderMenu();
            }
        }

        // --- LÓGICA CRUD ---
        function crudInventario() {
            const nombre = document.getElementById('inv-nombre').value;
            const medida = document.getElementById('inv-medida').value;
            const precio = Number(document.getElementById('inv-precio').value.replace(/\./g, ""));
            const ref = db.ref(`negocios/${sectorActivo}/inventario`);
            if(idEdicion) ref.child(idEdicion).update({ nombre, medida, precio });
            else ref.push({ nombre, medida, precio });
            abrirSeccion('inventario');
        }

        function renderInventario() {
            db.ref(`negocios/${sectorActivo}/inventario`).on('value', snap => {
                const tbody = document.getElementById('lista-inv'); if(!tbody) return;
                tbody.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    tbody.innerHTML += `<tr><td>${p.nombre}</td><td>${p.medida}</td><td>${p.precio.toLocaleString('es-PY')} Gs</td>
                    <td><button class="btn-edit" onclick="prepararEdicionInv('${child.key}','${p.nombre}','${p.medida}','${p.precio}')">✎</button>
                    <button class="btn-delete" onclick="borrar('inventario','${child.key}')">✕</button></td></tr>`;
                });
            });
        }

        function prepararEdicionInv(id, n, m, p) {
            idEdicion = id;
            document.getElementById('inv-nombre').value = n;
            document.getElementById('inv-medida').value = m;
            document.getElementById('inv-precio').value = Number(p).toLocaleString('es-PY');
            document.getElementById('btn-inv').innerText = "ACTUALIZAR PRODUCTO";
        }

        function crudGasto() {
            const desc = document.getElementById('gas-desc').value;
            const monto = Number(document.getElementById('gas-monto').value.replace(/\./g, ""));
            const ref = db.ref(`negocios/${sectorActivo}/gastos`);
            if(idEdicion) ref.child(idEdicion).update({ desc, monto });
            else ref.push({ desc, monto });
            abrirSeccion('gastos');
        }

        function renderGastos() {
            db.ref(`negocios/${sectorActivo}/gastos`).on('value', snap => {
                const tbody = document.getElementById('lista-gas'); if(!tbody) return;
                tbody.innerHTML = "";
                snap.forEach(child => {
                    const g = child.val();
                    tbody.innerHTML += `<tr><td>${g.desc}</td><td>${g.monto.toLocaleString('es-PY')} Gs</td>
                    <td><button class="btn-edit" onclick="prepararEdicionGas('${child.key}','${g.desc}','${g.monto}')">✎</button>
                    <button class="btn-delete" onclick="borrar('gastos','${child.key}')">✕</button></td></tr>`;
                });
            });
        }

        function prepararEdicionGas(id, d, m) {
            idEdicion = id;
            document.getElementById('gas-desc').value = d;
            document.getElementById('gas-monto').value = Number(m).toLocaleString('es-PY');
            document.getElementById('btn-gas').innerText = "ACTUALIZAR GASTO";
        }

        function crudPersonal() {
            const nombre = document.getElementById('per-nombre').value;
            const cargo = document.getElementById('per-cargo').value;
            const cv = document.getElementById('per-cv').value;
            const ref = db.ref(`negocios/${sectorActivo}/personal`);
            if(idEdicion) ref.child(idEdicion).update({ nombre, cargo, cv });
            else ref.push({ nombre, cargo, cv });
            abrirSeccion('personal');
        }

        function renderPersonal() {
            db.ref(`negocios/${sectorActivo}/personal`).on('value', snap => {
                const div = document.getElementById('lista-per'); if(!div) return;
                div.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    div.innerHTML += `<div class="card" style="margin-bottom:10px; text-align:left;">
                        <div class="accion-flotante">
                            <button class="btn-edit" onclick="prepararEdicionPer('${child.key}','${p.nombre}','${p.cargo}','${p.cv}')">✎</button>
                            <button class="btn-delete" onclick="borrar('personal','${child.key}')">✕</button>
                        </div>
                        <strong>${p.nombre}</strong><br><small>${p.cargo}</small><p style="font-size:0.8rem; margin-top:10px;">${p.cv}</p>
                    </div>`;
                });
            });
        }

        function prepararEdicionPer(id, n, c, v) {
            idEdicion = id;
            document.getElementById('per-nombre').value = n;
            document.getElementById('per-cargo').value = c;
            document.getElementById('per-cv').value = v;
            document.getElementById('btn-per').innerText = "ACTUALIZAR DATOS";
        }

        function crudMenu() {
            const nombre = document.getElementById('menu-nombre').value;
            const ref = db.ref(`negocios/${sectorActivo}/menu`);
            if(idEdicion) ref.child(idEdicion).update({ nombre });
            else ref.push({ nombre, ingredientes: [] });
            abrirSeccion('menu');
        }

        function renderMenu() {
            db.ref(`negocios/${sectorActivo}/menu`).on('value', snap => {
                const div = document.getElementById('lista-menu'); if(!div) return;
                div.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    div.innerHTML += `
                        <div class="card" style="margin-bottom:15px; text-align:left;">
                            <div class="accion-flotante">
                                <button class="btn-edit" onclick="prepararEdicionMenu('${child.key}','${m.nombre}')">✎</button>
                                <button class="btn-delete" onclick="borrar('menu','${child.key}')">✕</button>
                            </div>
                            <h4 onclick="toggleReceta('${child.key}')" style="cursor:pointer; margin:0;">🍔 ${m.nombre}</h4>
                            <div id="receta-${child.key}" style="display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                                <div style="display:flex; gap:5px; margin-bottom:10px;">
                                    <select id="sel-${child.key}" style="flex:2;">
                                        <option value="">Ingrediente...</option>
                                        ${Object.keys(inventarioLocal).map(k=>`<option value="${k}">${inventarioLocal[k].nombre}</option>`).join('')}
                                    </select>
                                    <input type="number" id="cant-${child.key}" placeholder="Cantidad (g/ml/u)" style="flex:1;">
                                    <button onclick="addIngredienteCosto('${child.key}')" style="background:var(--cafe-suave); color:white; padding:5px 10px;">+</button>
                                </div>
                                <div id="items-${child.key}"></div>
                                <div style="text-align:right; margin-top:10px; font-weight:bold; color:var(--cafe-suave);">
                                    COSTO TOTAL: <span id="total-costo-${child.key}">0</span> Gs.
                                </div>
                            </div>
                        </div>`;
                    calcCostoProporcional(child.key);
                });
            });
        }

        function prepararEdicionMenu(id, n) {
            idEdicion = id;
            document.getElementById('menu-nombre').value = n;
            document.getElementById('btn-menu').innerText = "ACTUALIZAR NOMBRE";
        }

        function addIngredienteCosto(comidaId) {
            const invId = document.getElementById('sel-' + comidaId).value;
            const cantidad = Number(document.getElementById('cant-' + comidaId).value);
            if(invId && cantidad > 0) {
                db.ref(`negocios/${sectorActivo}/menu/${comidaId}/ingredientes`).push({ invId, cantidadUsada: cantidad });
                document.getElementById('cant-' + comidaId).value = "";
            }
        }

        function calcCostoProporcional(comidaId) {
            db.ref(`negocios/${sectorActivo}/menu/${comidaId}/ingredientes`).on('value', snap => {
                let totalPlato = 0;
                const cont = document.getElementById('items-' + comidaId); if(!cont) return;
                cont.innerHTML = "";
                
                snap.forEach(c => {
                    const rec = c.val();
                    const ing = inventarioLocal[rec.invId];
                    if(ing) {
                        // Lógica: Si es kg o L divide por 1000. Si es unid divide por 1.
                        const divisor = (ing.medida === 'unid') ? 1 : 1000;
                        const subCosto = (ing.precio / divisor) * rec.cantidadUsada;
                        totalPlato += subCosto;
                        
                        const unidadTexto = (ing.medida === 'kg') ? 'g' : (ing.medida === 'L' ? 'ml' : 'u');
                        
                        cont.innerHTML += `<div style="font-size:0.8rem; display:flex; justify-content:space-between; margin:5px 0; border-bottom:1px dashed #eee;">
                        <span>• ${ing.nombre} (${rec.cantidadUsada}${unidadTexto})</span>
                        <span>${Math.round(subCosto).toLocaleString('es-PY')} Gs 
                            <button onclick="borrarIng('${comidaId}','${c.key}')" style="color:red; background:none; cursor:pointer;">✕</button>
                        </span></div>`;
                    }
                });
                const elTotal = document.getElementById('total-costo-' + comidaId);
                if(elTotal) elTotal.innerText = Math.round(totalPlato).toLocaleString('es-PY');
            });
        }

        function borrarIng(mId, iId) { db.ref(`negocios/${sectorActivo}/menu/${mId}/ingredientes/${iId}`).remove(); }
        function borrar(path, id) { if(confirm("¿Seguro que querés borrar este registro?")) db.ref(`negocios/${sectorActivo}/${path}/${id}`).remove(); }
        function toggleReceta(id) { const el = document.getElementById('receta-'+id); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    </script>
</body>
</html>
