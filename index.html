<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    <style>
        /* Estilos generales siguiendo tu diseño de flores */
        body {
            background-color: #FFF5F5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #8C5E5E;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            margin: 0;
            color: #A67B7B;
            letter-spacing: 2px;
        }

        /* Contenedor de botones principales */
        .menu-inicio {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .btn-sector {
            background-color: #D4A5A5;
            color: white;
            border: none;
            padding: 40px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            text-transform: uppercase;
        }

        .btn-sector:hover {
            background-color: #A67B7B;
            transform: scale(1.05);
        }

        /* Caja de detalles que aparece al hacer clic */
        #detalle-negocio {
            display: none; /* Oculto por defecto */
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid #D4A5A5;
        }

        .grid-detalles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .seccion-info {
            background: #FFF9F9;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #D4A5A5;
        }

        .seccion-info h4 {
            margin-top: 0;
            color: #8C5E5E;
            border-bottom: 1px solid #F2DADA;
            padding-bottom: 5px;
        }

        .btn-cerrar {
            background-color: #8C5E5E;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <p style="font-style: italic; margin-bottom: 5px;">Leidyd</p>
        <h1>PLANIFICADOR</h1>
    </div>

    <!-- Sección de botones principales -->
    <div class="menu-inicio">
        <button class="btn-sector" onclick="mostrarDetalles('TRANSPORTE')">Transporte</button>
        <button class="btn-sector" onclick="mostrarDetalles('EL MANÁ')">El Maná</button>
        <button class="btn-sector" onclick="mostrarDetalles('MBURUKUJÁ')">Mburukujá</button>
        <button class="btn-sector" onclick="mostrarDetalles('RECORDATORIO')">Recordatorio</button>
    </div>

    <!-- La "Caja" de gestión dinámica -->
    <div id="detalle-negocio">
        <h2 id="titulo-negocio" style="text-align: center; color: #A67B7B;"></h2>
        
        <div class="grid-detalles">
            <!-- Inventario y Costos -->
            <div class="seccion-info">
                <h4>📦 Inventario</h4>
                <p><strong>Disponible:</strong> <span id="stock">--</span></p>
                <p><strong>Costo Total:</strong> <span id="costo">--</span></p>
            </div>

            <!-- Pagos y Fechas -->
            <div class="seccion-info">
                <h4>📅 Responsabilidades</h4>
                <p><strong>Pendiente:</strong> <span id="pagos">--</span></p>
                <p><strong>Fecha Pago:</strong> <span id="fecha">--</span></p>
            </div>

            <!-- Personal -->
            <div class="seccion-info">
                <h4>👥 Personal</h4>
                <p><strong>Gastos:</strong> <span id="gastos-p">--</span></p>
                <p><strong>CV:</strong> <a href="#" id="cv-link" style="color: #D4A5A5;">Ver Documentos</a></p>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn-cerrar" onclick="cerrarCaja()">Cerrar Gestión</button>
        </div>
    </div>

    <script>
        // Función para mostrar la información del sector seleccionado
        function mostrarDetalles(sector) {
            const caja = document.getElementById('detalle-negocio');
            const titulo = document.getElementById('titulo-negocio');
            
            titulo.innerText = "GESTIÓN: " + sector;
            caja.style.display = 'block';

            // Datos de ejemplo para "EL MANÁ"
            if(sector === 'EL MANÁ') {
                document.getElementById('stock').innerText = "Insumos de cocina completos";
                document.getElementById('costo').innerText = "1.200.000 Gs.";
                document.getElementById('pagos').innerText = "Luz y Proveedor de Carne";
                document.getElementById('fecha').innerText = "05/05/2026";
                document.getElementById('gastos-p').innerText = "Salarios Semanales";
            } else {
                // Limpiar campos para otros sectores por ahora
                document.getElementById('stock').innerText = "Sin datos";
                document.getElementById('costo').innerText = "0 Gs.";
                document.getElementById('pagos').innerText = "Al día";
                document.getElementById('fecha').innerText = "--/--/--";
                document.getElementById('gastos-p').innerText = "0 Gs.";
            }

            // Scroll suave hacia la caja
            caja.scrollIntoView({ behavior: 'smooth' });
        }

        function cerrarCaja() {
            document.getElementById('detalle-negocio').style.display = 'none';
        }
    </script>

</body>
</html>
