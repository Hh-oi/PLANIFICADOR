<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Leidyd</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { --rosa-pastel: #FFF5F5; --cafe-suave: #A67B7B; --dorado-tenue: #D4A5A5; --texto: #5A4444; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--rosa-pastel); color: var(--texto); }
        
        /* Navegación */
        #pantalla-bienvenida { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: white; }
        #panel-inicio, #vista-sub-menu, #seccion-contenido { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; text-align: center; }

        .grid-botones { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 40px 20px; border: 1px solid #eee; cursor: pointer; transition: 0.3s; border-radius: 8px; }
        .card:hover { border-color: var(--dorado-tenue); transform: translateY(-5px); }
        .card h3 { font-family: 'Cinzel', serif; letter-spacing: 2px; color: var(--cafe-suave); font-size: 0.9rem; }

        /* Estilos de Contenido */
        .bloque-blanco { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: left; max-width: 800px; margin: 0 auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 5px; box-sizing: border-box; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-principal { background: var(--cafe-suave); color: white; width: 100%; }
        
        /* Tablas */
        .contenedor-tabla { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #fafafa; padding: 12px; text-align: left; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--rosa-pastel); }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        /* Etiquetas */
        .badge-costo { background: var(--rosa-pastel); color: var(--cafe-suave); padding: 5px 10px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. BIENVENIDA -->
    <div id="pantalla-bienvenida">
        <h1 style="font-family:'Cinzel'; font-size: 3rem; color: var(--cafe-suave);">PLANIFICADOR</h1>
        <button onclick="cambiarVista('panel-inicio')" style="background:transparent; border:1px solid var(--dorado-tenue); padding:10px 40px; color:var(--cafe-suave); letter-spacing:3px;">INGRESAR</button>
    </div>

    <!-- 2. SELECCIÓN DE NEGOCIO -->
    <div id="panel-inicio">
        <h2 style="font-family:'Cinzel';">SELECCIONAR SECTOR</h2>
        <div class="grid-botones">
            <div class="card" onclick="seleccionarNegocio('EL_MANA')"><h3>EL MANÁ</h3></div>
            <div class="card" onclick="seleccionarNegocio('MBURUKUJA')"><h3>MBURUKUJÁ</h3></div>
            <div class="card" onclick="seleccionarNegocio('ESPUEMA')"><h3>ESPUMA</h3></div>
        </div>
    </div>

    <!-- 3. SUB-MENÚ DEL SECTOR -->
    <div id="vista-sub-menu">
        <button onclick="cambiarVista('panel-inicio')" style="float:left; background:none; color:var(--dorado-tenue);">← VOLVER</button>
        <h2 id="nombre-sector-titulo" style="font-family:'Cinzel'; letter-spacing:5px;"></h2>
        <div class="grid-botones">
            <div class="card" onclick="abrirSeccion('inventario')"><h3>📦 INVENTARIO</h3></div>
            <div class="card" onclick="abrirSeccion('menu')"><h3>🍔 MENÚ</h3></div>
            <div class="card" onclick="abrirSeccion('gastos')"><h3>💸 GASTOS</h3></div>
            <div class="card" onclick="abrirSeccion('personal')"><h3>👥 PERSONAL</h3></div>
        </div>
    </div>

    <!-- 4. SECCIÓN DE CONTENIDO DINÁMICO -->
    <div id="seccion-contenido">
        <button onclick="cambiarVista('vista-sub-menu')" style="float:left; background:none; color:var(--dorado-tenue);">← VOLVER AL MENÚ</button>
        <h2 id="titulo-seccion" style="font-family:'Cinzel'; margin-bottom:30px;"></h2>
        <div id="area-trabajo"></div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDMmt5ZsafqLxGLpRhfrpMdOGk3OUvyl9E",
            authDomain: "planificador-leidyd.firebaseapp.com",
            projectId: "planificador-leidyd",
            storageBucket: "planificador-leidyd.firebasestorage.app",
            messagingSenderId: "930473531039",
            appId: "1:930473531039:web:085de97dcd2547987b34aa",
            databaseURL: "https://planificador-leidyd-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sectorActivo = "";
        let inventarioLocal = {};

        // NAVEGACIÓN
        function cambiarVista(idVista) {
            document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
            document.getElementById(idVista).style.display = 'block';
        }

        function seleccionarNegocio(id) {
            sectorActivo = id;
            document.getElementById('nombre-sector-titulo').innerText = id.replace('_', ' ');
            cambiarVista('vista-sub-menu');
            // Precargar inventario para el menú
            db.ref(`negocios/${sectorActivo}/inventario`).on('value', snap => { inventarioLocal = snap.val() || {}; });
        }

        // LÓGICA DE SECCIONES
        function abrirSeccion(tipo) {
            const area = document.getElementById('area-trabajo');
            const titulo = document.getElementById('titulo-seccion');
            cambiarVista('seccion-contenido');
            area.innerHTML = "";

            if(tipo === 'inventario') {
                titulo.innerText = "GESTIÓN DE INVENTARIO";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="inv-nombre" placeholder="Nombre del producto">
                        <input type="text" id="inv-precio" placeholder="Precio de Costo (Gs)" oninput="formatearGs(this)">
                        <button class="btn-principal" onclick="guardarInventario()">GUARDAR EN INVENTARIO</button>
                        <div class="contenedor-tabla">
                            <table><thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                            <tbody id="tabla-inv-body"></tbody></table>
                        </div>
                    </div>`;
                renderizarInventario();
            } 
            
            else if(tipo === 'gastos') {
                titulo.innerText = "GASTOS DE SECTOR";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="gas-desc" placeholder="Descripción del gasto (ej: Luz, Alquiler)">
                        <input type="text" id="gas-monto" placeholder="Monto (Gs)" oninput="formatearGs(this)">
                        <button class="btn-principal" style="background:var(--dorado-tenue)" onclick="guardarGasto()">REGISTRAR GASTO</button>
                        <div style="margin-top:20px; text-align:center; padding:20px; background:var(--rosa-pastel)">
                            <p>TOTAL ACUMULADO</p><h2 id="total-gastos">0 Gs.</h2>
                        </div>
                    </div>`;
                renderizarGastos();
            }

            else if(tipo === 'personal') {
                titulo.innerText = "EQUIPO Y CURRICULUMS";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <input type="text" id="per-nombre" placeholder="Nombre completo">
                        <input type="text" id="per-cargo" placeholder="Cargo (ej: Cocinero)">
                        <textarea id="per-cv" placeholder="Experiencia o datos relevantes..."></textarea>
                        <button class="btn-principal" onclick="guardarPersonal()">AGREGAR PERSONAL</button>
                        <div id="lista-personal" style="margin-top:20px;"></div>
                    </div>`;
                renderizarPersonal();
            }

            else if(tipo === 'menu') {
                titulo.innerText = "MENÚ Y COSTOS DE RECETA";
                area.innerHTML = `
                    <div class="bloque-blanco">
                        <h3>Nueva Comida</h3>
                        <input type="text" id="menu-nombre" placeholder="Ej: Hamburguesa Especial">
                        <button class="btn-principal" onclick="crearComida()">CREAR EN MENÚ</button>
                        <div id="lista-menu" style="margin-top:20px;"></div>
                    </div>`;
                renderizarMenu();
            }
        }

        // --- FUNCIONES DE SOPORTE ---
        function formatearGs(input) {
            let num = input.value.replace(/\D/g, "");
            input.value = num ? Number(num).toLocaleString('es-PY') : "";
        }

        // --- INVENTARIO ---
        function guardarInventario() {
            const nombre = document.getElementById('inv-nombre').value;
            const precio = Number(document.getElementById('inv-precio').value.replace(/\./g, ""));
            if(nombre && precio) db.ref(`negocios/${sectorActivo}/inventario`).push({ nombre, precio });
        }

        function renderizarInventario() {
            db.ref(`negocios/${sectorActivo}/inventario`).on('value', snap => {
                const tbody = document.getElementById('tabla-inv-body');
                if(!tbody) return;
                tbody.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    tbody.innerHTML += `<tr><td>${p.nombre}</td><td>${p.precio.toLocaleString('es-PY')} Gs</td>
                    <td><button onclick="db.ref('negocios/${sectorActivo}/inventario/${child.key}').remove()" style="color:red; background:none;">✕</button></td></tr>`;
                });
            });
        }

        // --- GASTOS ---
        function guardarGasto() {
            const desc = document.getElementById('gas-desc').value;
            const monto = Number(document.getElementById('gas-monto').value.replace(/\./g, ""));
            if(desc && monto) db.ref(`negocios/${sectorActivo}/gastos`).push({ desc, monto });
        }

        function renderizarGastos() {
            db.ref(`negocios/${sectorActivo}/gastos`).on('value', snap => {
                let total = 0;
                snap.forEach(child => { total += child.val().monto; });
                const el = document.getElementById('total-gastos');
                if(el) el.innerText = total.toLocaleString('es-PY') + " Gs.";
            });
        }

        // --- PERSONAL ---
        function guardarPersonal() {
            const nombre = document.getElementById('per-nombre').value;
            const cargo = document.getElementById('per-cargo').value;
            const cv = document.getElementById('per-cv').value;
            if(nombre) db.ref(`negocios/${sectorActivo}/personal`).push({ nombre, cargo, cv });
        }

        function renderizarPersonal() {
            db.ref(`negocios/${sectorActivo}/personal`).on('value', snap => {
                const lista = document.getElementById('lista-personal');
                if(!lista) return;
                lista.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    lista.innerHTML += `<div class="bloque-blanco" style="margin-bottom:10px; border:1px solid #eee;">
                        <strong>${p.nombre}</strong> - <small>${p.cargo}</small><p style="font-size:0.8rem; color:#888;">${p.cv}</p>
                    </div>`;
                });
            });
        }

        // --- MENÚ Y RECETAS ---
        function crearComida() {
            const nombre = document.getElementById('menu-nombre').value;
            if(nombre) db.ref(`negocios/${sectorActivo}/menu`).push({ nombre, ingredientes: [] });
        }

        function renderizarMenu() {
            db.ref(`negocios/${sectorActivo}/menu`).on('value', snap => {
                const lista = document.getElementById('lista-menu');
                if(!lista) return;
                lista.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    lista.innerHTML += `
                        <div class="card" style="padding:15px; text-align:left; margin-bottom:10px;">
                            <div style="display:flex; justify-content:space-between;">
                                <h4 style="margin:0; cursor:pointer;" onclick="toggleReceta('${child.key}')">🍔 ${m.nombre}</h4>
                                <span class="badge-costo" id="costo-${child.key}">Costo: 0 Gs</span>
                            </div>
                            <div id="receta-${child.key}" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                                <select onchange="agregarIngrediente('${child.key}', this.value)">
                                    <option>+ Agregar ingrediente del inventario...</option>
                                    ${Object.keys(inventarioLocal).map(k => `<option value="${k}">${inventarioLocal[k].nombre}</option>`).join('')}
                                </select>
                                <div id="items-${child.key}"></div>
                            </div>
                        </div>`;
                    calcularCostoComida(child.key);
                });
            });
        }

        function toggleReceta(id) {
            const el = document.getElementById('receta-' + id);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function agregarIngrediente(comidaId, invId) {
            db.ref(`negocios/${sectorActivo}/menu/${comidaId}/ingredientes`).push(invId);
        }

        function calcularCostoComida(comidaId) {
            db.ref(`negocios/${sectorActivo}/menu/${comidaId}/ingredientes`).on('value', snap => {
                let total = 0;
                const contenedor = document.getElementById('items-' + comidaId);
                if(contenedor) contenedor.innerHTML = "";
                
                snap.forEach(child => {
                    const invId = child.val();
                    if(inventarioLocal[invId]) {
                        total += inventarioLocal[invId].precio;
                        if(contenedor) contenedor.innerHTML += `<div style="font-size:0.8rem; display:flex; justify-content:space-between; padding:5px 0;">
                            <span>• ${inventarioLocal[invId].nombre}</span>
                            <span>${inventarioLocal[invId].precio.toLocaleString('es-PY')} Gs</span>
                        </div>`;
                    }
                });
                const costoEl = document.getElementById('costo-' + comidaId);
                if(costoEl) costoEl.innerText = "Costo: " + total.toLocaleString('es-PY') + " Gs";
            });
        }
    </script>
</body>
</html>
